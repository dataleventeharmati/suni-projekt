name: pipeline-ci

on:
  push:
  pull_request:

jobs:
  sanity-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Python syntax check
        run: |
          python -m py_compile src/*.py

      - name: Verify key project files exist
        run: |
          test -f Makefile
          test -f config.yaml
          test -f requirements.txt
          test -f src/pipeline.py
          test -f src/ingest_bronze.py
          test -f src/validate_and_clean.py
          test -f src/dq_gate.py
          test -f src/build_gold_kpis.py
          test -f src/report_kpi_html.py
          test -f src/artifacts_summary.py
          test -f src/data_profile_report.py
          test -f scripts/build_delivery.sh

      - name: Verify Make targets exist
        run: |
          grep -q '^run:' Makefile
          grep -q '^deliver:' Makefile

      - name: Safe smoke check
        run: |
          python - <<'PY'
          from pathlib import Path

          files = [
              "src/pipeline.py",
              "src/ingest_bronze.py",
              "src/validate_and_clean.py",
              "src/dq_gate.py",
              "src/build_gold_kpis.py",
              "src/report_kpi_html.py",
              "src/artifacts_summary.py",
              "src/data_profile_report.py",
          ]

          for file in files:
              text = Path(file).read_text(encoding="utf-8")
              assert "def main" in text or "__name__" in text or "import " in text
              print(f"OK checked: {file}")
          PY
